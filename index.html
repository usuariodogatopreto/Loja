<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./src/style.css" rel="stylesheet">
    <meta id="id" content="1">
    <title>Cadastrar Produtos</title>
</head>

<body>
    <div id="centro">
        <div class="grupo">
            <span>Nome do produto:</span>
            <input name="nome" class="campo" type="text" onkeyup="valido(); enter(event, 'compra')" enterkeyhint="next" tabindex="0">
        </div>
        <div class="grupo">
            <span>Valor de compra:</span>
            <input name="compra" class="campo" type="number" onkeyup="valido(); enter(event, 'venda')" tabindex="0">
        </div>
        <div class="grupo">
            <span>Valor de venda:</span>
            <input name="venda" class="campo" type="number" onkeyup="valido(); enter(event, 'button')">
        </div>
        <button id="cadastrar" onclick="cadastrarProduto()" disabled>Cadastrar</button>
    </div>
    <div id="navegacao">
        <div id="cadastrarNav">
            <span class="navegacaoOpcao">
                Cadastrar Produto
            </span>
        </div>
        <div id="estoque">
            <span class="navegacaoOpcao">
                Estoque
            </span>
        </div>
        <div>
            <span class="navegacaoOpcao">
                Cadastrar Produto
            </span>
        </div>
    </div>
</body>
<script src="./src/script.js" type="text/javascript"></script>

</html>
